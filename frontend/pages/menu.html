<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/src/assets/logo-sinfondo.png" />
    
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/menu.css">
    
    <title>Menú | LUX Restaurant</title>
</head>
<body>

    <header id="navbar" class="main-header">
        <div class="header-container">
            <a href="../index.html" class="logo-group">
                <img src="../src/assets/logo-sinfondo.png" alt="Logo">
                <div class="logo-text">
                    <span class="brand-lux">LUX</span>
                    <span class="brand-rest">Restaurant</span>
                </div>
            </a>
            
            <nav class="desktop-nav">
                <a href="../index.html" class="nav-link">Inicio</a>
                <a href="#" class="nav-link active-link">Menú</a>
                <a href="ubicacion.html" class="nav-link">Ubicación</a>
            </nav>

            <div class="header-actions">
                <a href="login.html" id="auth-link" class="login-btn-header group">
                    <span>ACCESO</span>
                    <div class="icon-circle">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    </div>
                </a>

                <button id="menu-btn" class="burger-btn">
                    <svg id="icon-burger" class="icon-transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    <svg id="icon-close" class="icon-transition hidden-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <div id="mobile-menu" class="mobile-menu-overlay">
        <nav id="mobile-nav-content">
            <img src="../src/assets/logo-sinfondo.png" class="mobile-logo" alt="Logo">
            <a href="../index.html" class="mobile-link">INICIO</a>
            <a href="#" class="mobile-link" style="color: #ffd700;">MENÚ</a>
            <a href="ubicacion.html" class="mobile-link">UBICACIÓN</a>
            <a href="login.html" class="btn-outline mobile-btn">ACCEDER</a>
        </nav>
    </div>

    <section class="menu-hero">
        <img src="../src/assets/fondo.png" alt="Fondo Menu">
        <div class="hero-overlay"></div>
        <div class="menu-title-block">
            <h1>NUESTRA CARTA</h1>
            <div class="title-separator"></div>
        </div>
    </section>

    <nav class="menu-tabs">
        <button class="tab-btn active" data-target="starters">Entrantes</button>
        <button class="tab-btn" data-target="mains">Principales</button>
        <button class="tab-btn" data-target="desserts">Postres</button>
        <button class="tab-btn" data-target="wines">Bodega</button>
    </nav>

    <main class="menu-container">
        <div id="starters" class="menu-category active"></div>
        <div id="mains" class="menu-category"></div>
        <div id="desserts" class="menu-category"></div>
        <div id="wines" class="menu-category"></div>

    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <img src="../src/assets/logo-sinfondo.png" alt="Logo Footer">
                <p>© 2026 LUX RESTAURANT.</p>
            </div>
            <div class="footer-links">
                <a href="politica-privacidad.html">Privacidad</a>
                <a href="aviso-legal.html">Aviso Legal</a>
                <a href="politica-cookies.html">Cookies</a>
            </div>
        </div>
    </footer>

    <script type="module" src="../src/js/session.js"></script>
    <script type="module" src="../src/js/main.js"></script>
    <script type="module" src="../src/js/menu.js"></script>
</body>
</html>
