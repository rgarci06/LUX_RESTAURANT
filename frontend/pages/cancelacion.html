<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../src/assets/logo-sinfondo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/legal.css">
    <link rel="stylesheet" href="../src/css/confirmacion.css">
    
    <title>Cancelación de Reserva | LUX Restaurant</title>
</head>
<body style="background-color: #0a0a0a;">

    <header id="navbar" class="main-header">
        <div class="header-container" style="justify-content: center;">
            <a href="../index.html" class="logo-group">
                <img src="../src/assets/logo-sinfondo.png" alt="Logo">
                <div class="logo-text">
                    <span class="brand-lux">LUX</span>
                    <span class="brand-rest">Restaurant</span>
                </div>
            </a>
        </div>
    </header>

    <main class="legal-container success-wrapper">
        <div id="cancel-icon" class="success-icon" style="color: #aaaaaa;">⌛</div>
        <h1 id="cancel-title" class="legal-title" style="color: #aaaaaa;">PROCESANDO...</h1>
        <p id="cancel-subtitle" class="legal-subtitle" style="margin-bottom: 40px; font-size: 22px;">
            Estamos anulando tu reserva
        </p>

        <div class="legal-card" style="max-width: 600px; padding: 40px;">
            <p id="cancel-message" style="text-align: center; margin-bottom: 35px; font-size: 18px;">
                Por favor, espera un momento.
            </p>
            <a href="../index.html" class="btn-login" style="display: inline-block; text-decoration: none; padding: 18px 40px;">
                VOLVER AL INICIO
            </a>
        </div>
    </main>

    <script type="module" src="../src/js/cancelacion.js"></script>
</body>
</html>
