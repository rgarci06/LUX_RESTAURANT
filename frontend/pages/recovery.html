<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | LUX Restaurant</title>
    <link rel="icon" type="image/png" href="../src/assets/logo-sinfondo.png" />
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/login.css">
</head>
<body>
    <div class="login-bg">
        <img src="../src/assets/fondo.png" alt="Fondo">
        <div class="login-overlay"></div>
    </div>

    <main class="login-container">
        <div class="glass-card">
            <img src="../src/assets/logo-sinfondo.png" class="login-logo" alt="Logo">
            <h2 class="login-title">NUEVA CONTRASEÑA</h2>

            <form id="recovery-form" class="form-visible">
                <p class="forgot-description" style="margin-bottom: 20px;">
                    Introduce tu nueva contraseña. Asegúrate de que ambas coincidan.
                </p>
                <div class="input-group">
                    <label class="label-luxury">Nueva Contraseña</label>
                    <input type="password" id="new-pwd" class="input-luxury" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="input-group">
                    <label class="label-luxury">Confirmar Contraseña</label>
                    <input type="password" id="confirm-pwd" class="input-luxury" placeholder="Repite la contraseña" required>
                </div>
                <button type="submit" class="btn-login" style="margin-top: 10px;">GUARDAR CONTRASEÑA</button>
            </form>
        </div>
    </main>

    <script type="module" src="../src/js/recovery.js"></script>
</body>
</html>
